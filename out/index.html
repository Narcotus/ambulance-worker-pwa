<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#e11d2e">
  <meta name="description" content="Оффлайн-справочник для работников скорой медицинской помощи: приказы, клинические рекомендации, медицинские калькуляторы и шпаргалки.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-icon.png">
  <title>СМП Ассистент — справочник фельдшера</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #6b6b80;
      --primary: #e11d2e;
      --primary-light: rgba(225,29,46,0.1);
      --border: #e5e5e5;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
      min-height: 100dvh; -webkit-font-smoothing: antialiased;
    }
    .app {
      max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100dvh;
    }
    header {
      padding: 16px 16px 12px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border); background: var(--card);
      position: sticky; top: 0; z-index: 10;
    }
    .logo {
      width: 36px; height: 36px; background: var(--primary); color: #fff;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: bold;
    }
    header h1 { font-size: 14px; font-weight: 700; }
    header span { font-size: 11px; color: var(--muted); }
    .offline-badge {
      margin-left: auto; font-size: 10px; padding: 2px 8px;
      border-radius: 20px; background: #e8f5e9; color: #2e7d32;
    }

    .search-box {
      padding: 0 16px 12px; display: none;
    }
    .search-box.visible { display: block; }
    .search-box input {
      width: 100%; padding: 10px 12px 10px 36px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 14px; background: var(--bg);
    }
    .search-box .search-icon {
      position: absolute; margin: 10px 0 0 10px; color: var(--muted);
    }

    main { flex: 1; padding: 16px 16px 100px; }

    /* Home */
    .home-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .home-card {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; text-align: left; transition: box-shadow 0.15s;
    }
    .home-card:active { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .home-card .icon { font-size: 24px; width: 40px; text-align: center; flex-shrink: 0; }
    .home-card .title { font-size: 15px; font-weight: 600; }
    .home-card .subtitle { font-size: 12px; color: var(--muted); }

    .section-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }

    /* Favorites */
    .fav-item {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 6px; cursor: pointer;
    }
    .fav-star { color: #f5a623; font-size: 18px; cursor: pointer; }

    /* Lists */
    .list-item {
      display: flex; align-items: center; gap: 10px; padding: 14px 14px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      margin-bottom: 6px; cursor: pointer;
    }
    .list-item:active { background: #f9f9fb; }
    .list-item .info { flex: 1; min-width: 0; }
    .list-item .title { font-size: 14px; font-weight: 600; }
    .list-item .meta { font-size: 11px; color: var(--muted); }
    .badge {
      font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600;
    }
    .badge-crit { background: var(--primary-light); color: var(--primary); }
    .badge-warn { background: #fff3e0; color: #e65100; }
    .badge-ok { background: #e8f5e9; color: #2e7d32; }

    /* Tabs */
    .tabs {
      display: flex; overflow-x: auto; gap: 4px; padding-bottom: 12px;
    }
    .tab {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; background: #fff;
    }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* Calculator result */
    .calc-result {
      margin-top: 16px; padding: 16px; border-radius: var(--radius); text-align: center; display: none;
    }
    .calc-result.visible { display: block; }
    .calc-result .score { font-size: 36px; font-weight: 700; }
    .calc-result .desc { font-size: 13px; margin-top: 4px; }

    /* Bottom nav */
    nav.bottom {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; display: flex;
      border-top: 1px solid var(--border); background: var(--card);
    }
    nav.bottom button {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 2px; padding: 8px 4px; border: none; background: none;
      font-size: 10px; color: var(--muted); cursor: pointer;
    }
    nav.bottom button.active { color: var(--primary); }

    /* Fullscreen viewer */
    .viewer {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100;
      background: #fff; transform: translateY(100%);
      transition: transform 0.3s ease; display: flex; flex-direction: column;
    }
    .viewer.open { transform: translateY(0); }
    .viewer-header {
      display: flex; align-items: center; padding: 8px 12px;
      border-bottom: 1px solid var(--border); gap: 8px;
    }
    .viewer-header button {
      width: 40px; height: 40px; border: none; background: none;
      font-size: 20px; cursor: pointer; border-radius: 50%;
    }
    .viewer-header h2 { flex: 1; font-size: 16px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .viewer-content { flex: 1; overflow-y: auto; padding: 16px; line-height: 1.7; font-size: 14px; }
    .viewer-content h3 { margin: 16px 0 8px; color: var(--primary); font-size: 16px; }
    .viewer-content ul, .viewer-content ol { padding-left: 20px; }
    .viewer-content li { margin-bottom: 8px; }
    .viewer-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    .viewer-content td { padding: 8px; border-bottom: 1px solid var(--border); }

    .empty { text-align: center; padding: 40px 16px; color: var(--muted); }
    .mt-16 { margin-top: 16px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // DATA
    const DATA = {
      orders: [
        { id: 'order_1', number: '№ 388н', title: 'Порядок оказания скорой медпомощи', issuer: 'Минздрав РФ', date: '20.06.2013', category: 'Организация', summary: 'Базовый порядок работы СМП: поводы, время доезда, состав бригад.', content: '<h3>Форма оказания помощи</h3><p>Экстренная — угроза жизни. Неотложная — без явных признаков угрозы. Время доезда экстренной бригады — не более 20 минут.</p><h3>Состав бригад</h3><p>Фельдшерская, врачебная, специализированные (реанимация, педиатрия, психиатрия).</p>' },
        { id: 'order_2', number: '№ 1080н', title: 'Требования к комплектации укладок СМП', issuer: 'Минздрав РФ', date: '11.10.2020', category: 'Лекарства', summary: 'Состав укладок: препараты, медизделия, расходники.', content: '<h3>Укладка общепрофильной бригады</h3><p>ИВЛ, инфузия, СЛР (эпинефрин, амиодарон), анальгетики, спазмолитики, противосудорожные.</p><h3>Контроль</h3><p>Ежесменная проверка комплектности и сроков годности.</p>' },
        { id: 'order_3', number: 'СанПиН 3.3686-21', title: 'Санитарно-эпидемиологические требования', issuer: 'Роспотребнадзор', date: '28.01.2021', category: 'Санэпид', summary: 'Дезинфекция транспорта, медотходы, аварийные ситуации.', content: '<h3>Обработка салона</h3><p>Дезинфекция после инфекционного больного по режиму инфекции. Обеззараживание воздуха — бактерицидным облучателем.</p>' },
      ],
      guidelines: [
        { id: 'acs', title: 'Острый коронарный синдром', category: 'Кардиология', severity: 'critical', summary: 'Боль в груди, подозрение на ИМ. Обезболивание, антиагреганты.', content: '<h3>Первичная оценка</h3><ol><li>ЭКГ в 12 отведениях — 10 минут</li><li>Мониторинг: SpO2, АД, ЧСС</li><li>Оксигенотерапия при SpO2 < 90%</li></ol><h3>Медикаменты</h3><ol><li>Аспирин 150-300 мг разжевать</li><li>Нитроглицерин 0,4 мг сублингвально</li><li>Морфин 2-4 мг в/в</li></ol>' },
        { id: 'anaphylaxis', title: 'Анафилаксия', category: 'Шок/Аллергия', severity: 'critical', summary: 'Адреналин немедленно. Острая системная реакция.', content: '<h3>Немедленно</h3><ol><li>Адреналин 0,5 мг в/м в бедро</li><li>Прекратить контакт с аллергеном</li><li>Положение лёжа, ноги приподняты</li></ol><h3>Вторая линия</h3><ol><li>Инфузия кристаллоидов 500-1000 мл</li><li>Кислород высокопоточный</li><li>Антигистаминные, ГКС</li></ol>' },
        { id: 'stroke', title: 'ОНМК (инсульт)', category: 'Неврология', severity: 'critical', summary: 'FAST-тест. Быстрая доставка в сосудистый центр.', content: '<h3>FAST-тест</h3><ul><li>Face — асимметрия лица</li><li>Arm — слабость в руке</li><li>Speech — нарушение речи</li><li>Time — зафиксировать время</li></ul><h3>Тактика</h3><p>Не снижать АД резко. Глюкоза крови. Головной конец 30°.</p>' },
        { id: 'cpr', title: 'СЛР (взрослые)', category: 'Реанимация', severity: 'critical', summary: 'Компрессии 100-120/мин, дефибрилляция.', content: '<h3>Базовые мероприятия</h3><ol><li>Компрессии 100-120/мин, глубина 5-6 см</li><li>30:2 (без интубации)</li><li>Смена каждые 2 минуты</li></ol><h3>Дефибрилляция</h3><p>Разряд → 2 мин СЛР → оценка ритма. Адреналин 1 мг каждые 3-5 мин.</p>' },
      ],
      calculators: [
        { id: 'gcs', name: 'Шкала комы Глазго', short: 'GCS', icon: '🧠', type: 'gcs' },
        { id: 'wells', name: 'Шкала Wells (ТЭЛА)', short: 'Wells', icon: '🫁', type: 'wells' },
        { id: 'apgar', name: 'Шкала APGAR', short: 'APGAR', icon: '👶', type: 'apgar' },
        { id: 'dosing', name: 'Дозировки по весу', short: 'Дозы', icon: '💊', type: 'dosing' },
        { id: 'infusion', name: 'Скорость инфузии', short: 'Инфузия', icon: '💧', type: 'infusion' },
        { id: 'bmi', name: 'ИМТ и ППТ', short: 'ИМТ', icon: '📏', type: 'bmi' },
      ],
      favorites: JSON.parse(localStorage.getItem('smp_fav') || '[]'),
    };

    function saveFav() { localStorage.setItem('smp_fav', JSON.stringify(DATA.favorites)); }

    let currentTab = 'home';
    let searchQuery = '';

    function render() {
      const app = document.getElementById('app');
      const showSearch = currentTab !== 'home';

      app.innerHTML = `
        <div class="app">
          <header>
            <div class="logo">✚</div>
            <div><h1>СМП Ассистент</h1><span>Справочник фельдшера</span></div>
            <div class="offline-badge">📴 Оффлайн</div>
          </header>
          <div class="search-box ${showSearch ? 'visible' : ''}">
            <input type="text" id="searchInput" placeholder="Поиск в разделе..." value="${searchQuery}">
          </div>
          <main>${renderContent()}</main>
          <nav class="bottom">
            <button class="${currentTab === 'home' ? 'active' : ''}" data-tab="home">🏠<span>Главная</span></button>
            <button class="${currentTab === 'guidelines' ? 'active' : ''}" data-tab="guidelines">📖<span>Рекоменд.</span></button>
            <button class="${currentTab === 'calculators' ? 'active' : ''}" data-tab="calculators">🧮<span>Калькул.</span></button>
            <button class="${currentTab === 'orders' ? 'active' : ''}" data-tab="orders">📋<span>Приказы</span></button>
            <button class="${currentTab === 'cheatsheets' ? 'active' : ''}" data-tab="cheatsheets">📝<span>Шпарг.</span></button>
          </nav>
        </div>
        <div class="viewer" id="viewer">
          <div class="viewer-header">
            <button id="viewerClose">✕</button>
            <h2 id="viewerTitle"></h2>
            <div style="width:40px"></div>
          </div>
          <div class="viewer-content" id="viewerContent"></div>
        </div>
      `;

      // Bottom nav
      app.querySelectorAll('nav.bottom button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTab = btn.dataset.tab;
          searchQuery = '';
          render();
        });
      });

      // Search
      const si = app.querySelector('#searchInput');
      if (si) {
        si.addEventListener('input', (e) => { searchQuery = e.target.value; render(); });
      }

      // Viewer
      app.querySelector('#viewerClose').addEventListener('click', closeViewer);
      app.querySelector('#viewer').addEventListener('click', (e) => { if (e.target.id === 'viewer') closeViewer(); });
    }

    function renderContent() {
      let list;
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        switch (currentTab) {
          case 'orders': list = DATA.orders.filter(o => (o.title + o.summary).toLowerCase().includes(q)); break;
          case 'guidelines': list = DATA.guidelines.filter(g => (g.title + g.summary).toLowerCase().includes(q)); break;
          case 'calculators': list = DATA.calculators.filter(c => (c.name).toLowerCase().includes(q)); break;
          default: list = [];
        }
      } else {
        switch (currentTab) {
          case 'orders': list = DATA.orders; break;
          case 'guidelines': list = DATA.guidelines; break;
          case 'calculators': list = DATA.calculators; break;
          default: list = [];
        }
      }

      switch (currentTab) {
        case 'home': return renderHome();
        case 'orders': return renderList('orders', list);
        case 'guidelines': return renderList('guidelines', list);
        case 'calculators': return renderCalcGrid(list);
        case 'cheatsheets': return renderCheatsheets();
        default: return '';
      }
    }

    function renderHome() {
      const critical = DATA.guidelines.filter(g => g.severity === 'critical').slice(0, 3);
      const favs = DATA.favorites;
      return `
        <h2 style="font-size:20px;margin-bottom:4px">${greeting()}</h2>
        <p style="color:var(--muted);font-size:14px;margin-bottom:16px">${today()}</p>
        <div class="section-title">Разделы</div>
        <div class="home-grid">
          <div class="home-card" data-nav="guidelines"><span class="icon">📖</span><div><div class="title">Клинические рекомендации</div><div class="subtitle">Протоколы неотложных состояний</div></div></div>
          <div class="home-card" data-nav="calculators"><span class="icon">🧮</span><div><div class="title">Калькуляторы</div><div class="subtitle">Дозы, шкалы, инфузия</div></div></div>
          <div class="home-card" data-nav="orders"><span class="icon">📋</span><div><div class="title">Приказы</div><div class="subtitle">Нормативные документы</div></div></div>
          <div class="home-card" data-nav="cheatsheets"><span class="icon">📝</span><div><div class="title">Шпаргалки</div><div class="subtitle">Таблицы и ориентиры</div></div></div>
        </div>
        ${critical.length ? `
          <div class="section-title">🚨 Экстренные протоколы</div>
          ${critical.map(g => `<div class="list-item" data-open="guideline" data-id="${g.id}"><span>${g.category === 'Кардиология' ? '❤️' : g.category === 'Неврология' ? '🧠' : '🚨'}</span><div class="info"><div class="title">${g.title}</div><div class="meta">${g.category}</div></div></div>`).join('')}
        ` : ''}
        <div class="section-title mt-16">⭐ Избранное</div>
        ${favs.length ? favs.map(f => `<div class="fav-item" data-open="${f.type}" data-id="${f.id}" data-title="${f.title}"><span>${f.type === 'guideline' ? '📖' : f.type === 'order' ? '📋' : '🧮'}</span><div class="info"><div class="title">${f.title}</div></div><span class="fav-star" data-remove="${f.id}">★</span></div>`).join('') : '<div class="empty">Добавляйте документы в избранное</div>'}
      `;
    }

    function renderList(type, list) {
      if (!list.length) return '<div class="empty">Ничего не найдено</div>';
      return list.map(item => {
        if (type === 'guidelines') {
          const sev = item.severity === 'critical' ? 'badge-crit' : 'badge-warn';
          return `<div class="list-item" data-open="guideline" data-id="${item.id}"><span>${item.category === 'Кардиология' ? '❤️' : item.category === 'Неврология' ? '🧠' : '🚨'}</span><div class="info"><div class="title">${item.title}</div><div class="meta">${item.category} <span class="badge ${sev}">${item.severity === 'critical' ? 'Критично' : 'Срочно'}</span></div></div><span class="fav-star ${isFav('guideline', item.id) ? 'fav-star--active' : ''}" data-fav="guideline" data-id="${item.id}" data-title="${item.title}">${isFav('guideline', item.id) ? '★' : '☆'}</span></div>`;
        }
        return `<div class="list-item" data-open="order" data-id="${item.id}"><span>📄</span><div class="info"><div class="title">${item.number} ${item.title}</div><div class="meta">${item.date} · ${item.category}</div></div><span class="fav-star ${isFav('order', item.id) ? 'fav-star--active' : ''}" data-fav="order" data-id="${item.id}" data-title="${item.title}">${isFav('order', item.id) ? '★' : '☆'}</span></div>`;
      }).join('');
    }

    function renderCalcGrid(list) {
      if (!list.length) return '<div class="empty">Ничего не найдено</div>';
      return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">${list.map(c => `
        <div class="home-card" style="flex-direction:column;text-align:center;gap:6px;padding:16px 8px" data-open="calculator" data-id="${c.id}" data-title="${c.name}">
          <span style="font-size:28px">${c.icon}</span>
          <span style="font-size:12px;font-weight:600">${c.short}</span>
        </div>`).join('')}</div>`;
    }

    function renderCheatsheets() {
      return `
        <div class="section-title">📝 Шпаргалки</div>
        <div class="list-item" data-open="cheat" data-id="emergency-drugs"><span>💉</span><div class="info"><div class="title">Препараты для СЛР</div><div class="meta">Дозировки взрослым</div></div></div>
        <div class="list-item" data-open="cheat" data-id="vital-norms"><span>📊</span><div class="info"><div class="title">Нормы витальных показателей</div><div class="meta">ЧСС, ЧДД, АД по возрасту</div></div></div>
        <div class="list-item" data-open="cheat" data-id="abcde"><span>🔤</span><div class="info"><div class="title">Алгоритм ABCDE</div><div class="meta">Первичный осмотр</div></div></div>
        <div class="list-item" data-open="cheat" data-id="avpu"><span>🧠</span><div class="info"><div class="title">Шкала AVPU</div><div class="meta">Оценка сознания</div></div></div>
        <div class="list-item" data-open="cheat" data-id="infusion-rates"><span>💧</span><div class="info"><div class="title">Скорость инфузии</div><div class="meta">Капли/мин → мл/ч</div></div></div>
      `;
    }

    function greeting() {
      const h = new Date().getHours();
      if (h < 5) return '🌙 Доброй ночи!';
      if (h < 12) return '🌅 Доброе утро!';
      if (h < 17) return '☀️ Добрый день!';
      if (h < 22) return '🌇 Добрый вечер!';
      return '🌙 Доброй ночи!';
    }

    function today() {
      return new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function isFav(type, id) {
      return DATA.favorites.some(f => f.type === type && f.id === id);
    }

    function toggleFav(type, id, title) {
      const idx = DATA.favorites.findIndex(f => f.type === type && f.id === id);
      if (idx >= 0) DATA.favorites.splice(idx, 1);
      else DATA.favorites.unshift({ type, id, title });
      saveFav();
      render();
    }

    function removeFav(id) {
      DATA.favorites = DATA.favorites.filter(f => f.id !== id);
      saveFav();
      render();
    }

    function openViewer(title, htmlContent) {
      const viewer = document.getElementById('viewer');
      document.getElementById('viewerTitle').textContent = title;
      document.getElementById('viewerContent').innerHTML = htmlContent;
      viewer.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeViewer() {
      document.getElementById('viewer').classList.remove('open');
      document.body.style.overflow = '';
    }
